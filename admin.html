<!doctype html>
<html lang="zh-Hans">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AKASHURA | 主站管理后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --paper: #f4ead6; --ink: #191713; --indigo: #193a5a; --red: #b73524; }
        body { background: var(--paper); color: var(--ink); }
        button, input, textarea { border-radius: 0; }
    </style>
</head>
<body class="min-h-screen">
    <header class="bg-[#191713] text-[#f4ead6] border-b-4 border-[#b73524] px-5 py-5 md:px-10 flex flex-wrap items-center justify-between gap-4">
        <div>
            <p class="text-[10px] uppercase tracking-[0.35em] text-[#d97864]">AKASHURA Guitars</p>
            <h1 class="text-xl md:text-2xl font-black">主站管理后台</h1>
        </div>
        <div class="flex gap-2">
            <a href="index.html" class="border border-[#f4ead6]/40 px-4 py-2 text-xs hover:border-white">回到主站</a>
            <a href="https://akashuraguitars.ai.studio/admin.html" target="_blank" rel="noopener" class="bg-[#b73524] px-4 py-2 text-xs hover:bg-[#92291c]">完整内容管理</a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-5 py-8 md:px-10">
        <section class="bg-[#f8efd9] border border-[#191713]/15 p-5 md:p-8 shadow-[6px_6px_0_rgba(25,58,90,0.12)]">
            <div class="flex flex-col md:flex-row md:items-end justify-between gap-3 border-b border-[#191713]/20 pb-5 mb-6">
                <div>
                    <p class="text-[10px] uppercase tracking-[0.35em] text-[#b73524]">Homepage Control</p>
                    <h2 class="text-2xl md:text-4xl font-black">首页区块管理</h2>
                    <p class="mt-2 text-sm text-[#3c3328]">调整顺序后，主站首页会按照新的排列显示。</p>
                </div>
                <span id="status" class="text-xs text-[#193a5a]"></span>
            </div>

            <div id="login-panel" class="max-w-md border border-[#191713]/15 bg-white p-5">
                <label for="password" class="block text-xs font-bold mb-2">管理密码</label>
                <div class="flex gap-2">
                    <input id="password" type="password" class="min-w-0 flex-1 border border-[#191713]/25 px-3 py-2" autocomplete="current-password">
                    <button onclick="login()" class="bg-[#193a5a] text-white px-5 py-2 text-xs font-bold">登入</button>
                </div>
                <p class="mt-3 text-xs text-[#6e6252]">密码只保存在当前浏览器分页，不写入网页。</p>
            </div>

            <div id="editor" class="hidden">
                <div id="order-list" class="grid grid-cols-1 md:grid-cols-5 gap-2 mb-8"></div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
                    <label class="block text-sm font-bold">Hero 标题
                        <textarea id="hero-title" rows="3" class="mt-2 w-full border border-[#191713]/20 bg-white p-3 font-normal"></textarea>
                    </label>
                    <label class="block text-sm font-bold">Hero Slogan
                        <input id="hero-slogan" class="mt-2 w-full border border-[#191713]/20 bg-white p-3 font-normal">
                    </label>
                    <label class="block text-sm font-bold lg:col-span-2">Hero 描述
                        <textarea id="hero-desc" rows="4" class="mt-2 w-full border border-[#191713]/20 bg-white p-3 font-normal"></textarea>
                    </label>
                    <label class="block text-sm font-bold">精神区块标题
                        <input id="custom-title" class="mt-2 w-full border border-[#191713]/20 bg-white p-3 font-normal">
                    </label>
                    <label class="block text-sm font-bold">精神区块副标题
                        <input id="custom-subtitle" class="mt-2 w-full border border-[#191713]/20 bg-white p-3 font-normal">
                    </label>
                    <label class="block text-sm font-bold lg:col-span-2">精神区块内文
                        <textarea id="custom-desc" rows="4" class="mt-2 w-full border border-[#191713]/20 bg-white p-3 font-normal"></textarea>
                    </label>
                </div>
                <div class="mt-6 flex justify-end">
                    <button onclick="save()" class="bg-[#b73524] text-white px-6 py-3 text-xs font-bold hover:bg-[#92291c]">保存并发布首页设定</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        const API = 'https://akashuraguitars.ai.studio';
        const labels = { families: '产品分类', duel: '浮世绘双琴', yasha: '夜叉主视觉', featured: '推荐产品', story: '品牌故事与新闻' };
        let order = Object.keys(labels);
        let db = { blocks: {} };
        const auth = () => ({ 'X-Admin-Password': sessionStorage.getItem('akashura_admin_password') || '' });
        const status = message => document.getElementById('status').textContent = message;

        function renderOrder() {
            document.getElementById('order-list').innerHTML = order.map((id, index) => `
                <div class="bg-white border border-[#193a5a]/20 p-3 flex items-center justify-between gap-2">
                    <span class="text-xs font-bold">${index + 1}. ${labels[id] || id}</span>
                    <span class="flex gap-1">
                        <button onclick="move(${index}, -1)" class="w-7 h-7 border border-gray-300 disabled:opacity-30" ${index === 0 ? 'disabled' : ''}>↑</button>
                        <button onclick="move(${index}, 1)" class="w-7 h-7 border border-gray-300 disabled:opacity-30" ${index === order.length - 1 ? 'disabled' : ''}>↓</button>
                    </span>
                </div>`).join('');
        }
        function move(index, delta) {
            const target = index + delta;
            if (target < 0 || target >= order.length) return;
            [order[index], order[target]] = [order[target], order[index]];
            renderOrder();
        }
        function setFields() {
            const b = db.blocks || {};
            order = db.homepageOrder?.length ? [...db.homepageOrder] : (b.order?.length ? [...b.order] : Object.keys(labels));
            renderOrder();
            document.getElementById('hero-title').value = b.hero?.title || '';
            document.getElementById('hero-slogan').value = b.hero?.slogan || '';
            document.getElementById('hero-desc').value = b.hero?.description || '';
            document.getElementById('custom-title').value = b.customShop?.title || '';
            document.getElementById('custom-subtitle').value = b.customShop?.subtitle || '';
            document.getElementById('custom-desc').value = b.customShop?.description || '';
        }
        async function login() {
            const password = document.getElementById('password').value;
            status('验证中…');
            try {
                const res = await fetch(`${API}/api/admin/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                if (!res.ok) throw new Error(res.status === 401 ? '密码错误' : `验证失败 ${res.status}`);
                sessionStorage.setItem('akashura_admin_password', password);
                await load();
            } catch (error) {
                status(`${error.message}。若从本机 file:// 开启，请先重新发布 Google 后台 API。`);
            }
        }
        async function load() {
            status('读取中…');
            try {
                const res = await fetch(`${API}/api/data`, { headers: auth() });
                if (!res.ok) throw new Error(`读取失败 ${res.status}`);
                db = await res.json();
                document.getElementById('login-panel').classList.add('hidden');
                document.getElementById('editor').classList.remove('hidden');
                setFields();
                status('已连接 Google 内容服务');
            } catch (error) { status(error.message); }
        }
        async function save() {
            status('保存中…');
            const payload = {
                order,
                hero: { title: document.getElementById('hero-title').value, slogan: document.getElementById('hero-slogan').value, description: document.getElementById('hero-desc').value },
                customShop: { title: document.getElementById('custom-title').value, subtitle: document.getElementById('custom-subtitle').value, description: document.getElementById('custom-desc').value }
            };
            try {
                const res = await fetch(`${API}/api/data/blocks`, { method: 'POST', headers: { 'Content-Type': 'application/json', ...auth() }, body: JSON.stringify(payload) });
                const result = await res.json();
                if (!res.ok) throw new Error(result.error || `保存失败 ${res.status}`);
                db.blocks = payload; db.homepageOrder = order;
                status('已保存并发布，主站刷新后生效');
            } catch (error) { status(error.message); }
        }
        if (sessionStorage.getItem('akashura_admin_password')) load();
    </script>
</body>
</html>
