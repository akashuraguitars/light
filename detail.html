﻿<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品详情</title>
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png?v=4">
    <link rel="shortcut icon" href="favicon.ico?v=4">
    <link rel="apple-touch-icon" href="assets/favicon-192.png?v=4">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/contentful@latest/dist/contentful.browser.min.js"></script>
    <style>
        :root {
            --paper: #f4ead6;
            --paper-deep: #ead7b3;
            --ink: #191713;
            --indigo: #193a5a;
            --vermilion: #b73524;
            --gold: #ad7c35;
        }
        body[data-theme="indigo"] {
            --paper: #edf0e6;
            --paper-deep: #d6ddcf;
            --ink: #15202a;
            --indigo: #123d63;
            --vermilion: #a33b2f;
            --gold: #94713d;
        }
        body[data-theme="vermilion"] {
            --paper: #f3e2cf;
            --paper-deep: #e5c3a5;
            --ink: #241713;
            --indigo: #253f55;
            --vermilion: #c2412d;
            --gold: #a06a28;
        }
        body[data-theme="sumi"] {
            --paper: #e9e1d1;
            --paper-deep: #d4c7b4;
            --ink: #111111;
            --indigo: #24313a;
            --vermilion: #9f3025;
            --gold: #826a45;
        }
        body {
            color: var(--ink);
            background:
                linear-gradient(color-mix(in srgb, var(--paper) 84%, transparent), color-mix(in srgb, var(--paper) 94%, transparent)),
                url('assets/ukiyo-wave-hero.jpg'),
                radial-gradient(circle at 12% 18%, rgba(183, 53, 36, 0.12), transparent 28%),
                linear-gradient(135deg, rgba(25, 58, 90, 0.05) 0 1px, transparent 1px 12px),
                var(--paper);
            background-size: cover, 680px auto, auto, auto;
            background-attachment: fixed, fixed, fixed, fixed;
            transition: background-color 180ms ease, color 180ms ease;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
            opacity: 0.32;
            background-image:
                repeating-linear-gradient(0deg, rgba(25, 23, 19, 0.05) 0 1px, transparent 1px 4px),
                repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.22) 0 1px, transparent 1px 6px);
            mix-blend-mode: multiply;
        }
        .theme-nav {
            background: color-mix(in srgb, var(--paper) 95%, white);
            color: var(--ink);
            border-color: color-mix(in srgb, var(--ink) 20%, transparent);
        }
        .theme-brand {
            background: var(--paper);
            border-color: color-mix(in srgb, var(--ink) 20%, transparent);
        }
        .theme-slogan,
        .theme-link:hover {
            color: var(--vermilion);
        }
        .theme-menu {
            background: color-mix(in srgb, var(--paper) 90%, white);
            color: var(--ink);
            border-color: color-mix(in srgb, var(--ink) 25%, transparent);
        }
        .mode-link {
            min-width: 104px;
            padding: 8px 12px;
            border: 1px solid color-mix(in srgb, var(--ink) 28%, transparent);
            color: var(--ink);
            background: color-mix(in srgb, var(--paper) 72%, white);
            font-size: 10px;
            letter-spacing: 0.18em;
            text-align: center;
            text-transform: uppercase;
            box-shadow: 3px 3px 0 color-mix(in srgb, var(--indigo) 14%, transparent);
        }
        .mode-link.active {
            color: var(--paper);
            background: var(--vermilion);
            border-color: var(--vermilion);
            box-shadow: 3px 3px 0 color-mix(in srgb, var(--vermilion) 22%, transparent);
        }
    </style>
</head>
<body>

    <!-- 导航列 -->
    <nav class="theme-nav p-2 md:p-5 sticky top-0 z-50 border-b backdrop-blur">
        <div class="w-full px-1 flex flex-wrap justify-center items-center text-[9px] md:text-sm uppercase font-light">
            <ul class="flex items-center text-[9px] md:text-sm uppercase font-light" style="gap: clamp(0.25rem, 3vw, 2rem);">
                <li class="relative">
                    <a href="index.html" class="theme-link">HOME</a>
                </li>
                <li class="relative">
                    <button onclick="toggleStory()" class="theme-link">STORY</button>
                    <div id="story-dropdown" class="theme-menu absolute right-0 mt-2 w-64 max-h-[70vh] overflow-y-auto border shadow-xl hidden p-2 z-50">
                    </div>
                </li>
                <li class="relative">
                    <a href="index.html?news=1" class="theme-link">NEWS</a>
                </li>
                <li class="relative">
                    <button onclick="toggleProducts()" class="theme-link">PRODUCTS</button>
                    <div id="dropdown-menu" class="theme-menu absolute right-0 mt-2 w-56 max-h-[70vh] overflow-y-auto border shadow-xl hidden p-2 z-50"></div>
                </li>
                <li class="text-[#191713]/35 cursor-not-allowed">ARTISTS</li>
                <li class="text-[#191713]/35 cursor-not-allowed">CONTACT</li>
            </ul>
        </div>
    </nav>

    <!-- 中间品牌区块：同步 index.html 大比例设计 -->
    <div id="brand-header" class="theme-brand flex flex-col items-center justify-center py-2 border-b px-4">
        <div class="w-[85%] md:w-[45%] max-w-[650px] flex flex-col items-center">
            <div id="brand-logo-container" class="w-full flex justify-center mb-0">
                <img id="brand-image" src="logo.png" alt="Akashura Guitars" class="w-full h-auto object-contain sepia saturate-[170%] hue-rotate-[345deg] contrast-125">
            </div>
            <h1 id="brand-title" class="text-4xl md:text-5xl font-extrabold tracking-widest text-[#191713] uppercase hidden">Akashura Guitars</h1>
            <p id="brand-slogan" class="theme-slogan w-full text-center text-[9px] md:text-xs font-light uppercase mt-1 tracking-[0.26em] md:tracking-[0.43em] whitespace-nowrap pl-[0.26em] md:pl-[0.43em]">Built for Your Own Sound</p>
            <div id="mode-switcher" class="mt-3 flex items-center justify-center gap-2" aria-label="切换网站模式">
                <a class="mode-link active" href="index.html" aria-current="page">浮世绘模式</a>
                <a id="shura-mode-link" class="mode-link" href="https://akashuraguitars.github.io/test/">修罗模式</a>
            </div>
        </div>
    </div>

    <div class="p-5 md:p-10">
        <div id="detail-view" class="max-w-6xl mx-auto bg-[#f8efd9]/90 text-[#191713] p-6 md:p-8 shadow border border-[#191713]/20">
            <p>正在载入产品资料...</p>
        </div>
    </div>

    <script>
        const client = contentful.createClient({
            space: 'w2up5vfofaou',
            environment: 'codex',
            accessToken: 'VGNRIRnLauegwmjZqzrm5zlceDtZt1Tq42PWr8Oh2Co'
        });

        const dropdown = document.getElementById('dropdown-menu');
        const storyDropdown = document.getElementById('story-dropdown');
        const brandImage = document.getElementById('brand-image');
        const brandSlogan = document.getElementById('brand-slogan');

        const localProductImages = {
            'guitar-akshura-chaos-of-blade-official-08': 'assets/formal-color-logo/guitars/chaos-of-blade/akashura-chaos-of-blade-official-08.jpg'
        };

        function toggleProducts() { dropdown.classList.toggle('hidden'); storyDropdown.classList.add('hidden'); }
        function toggleStory() { storyDropdown.classList.toggle('hidden'); dropdown.classList.add('hidden'); }
        const shuraModeLink = document.getElementById('shura-mode-link');
        if (shuraModeLink && location.hostname === 'localhost') {
            shuraModeLink.href = 'http://localhost:4177/index.html';
        }

        async function syncNav() {
            try {
                const familyData = await client.getEntries({ content_type: 'productFamily', order: 'fields.order' });
                dropdown.innerHTML = familyData.items.map(family => `
                    <a href="index.html?family=${family.sys.id}" class="block px-4 py-3 hover:bg-red-950/60">
                        <span class="block text-[10px] uppercase tracking-[0.2em] text-[#b73524] truncate">${family.fields.slug || family.fields.name}</span>
                        <span class="block pt-1 text-sm font-black text-[#191713] truncate">${family.fields.name || '产品大类'}</span>
                    </a>
                `).join('');
                if (!dropdown.innerHTML) dropdown.innerHTML = '<p class="px-4 py-2 text-xs text-gray-500">数据库尚未建立产品架构</p>';
                
                const storyData = await client.getEntries({ content_type: 'story' });
                storyDropdown.innerHTML = `
                    <a href="index.html?story=hub" class="block px-4 py-3 hover:bg-red-950/60">
                        <span class="block text-[10px] uppercase tracking-[0.2em] text-[#b73524]">Story</span>
                        <span class="block pt-1 text-sm font-black text-[#191713] truncate">故事总览</span>
                    </a>
                ` + storyData.items.map(s => `
                    <a href="index.html?story=${s.sys.id}" class="block px-4 py-3 hover:bg-[#ead7b3] uppercase text-sm font-black truncate">${s.fields.brandStory || '品牌故事'}</a>
                `).join('');
                
                const siteData = await client.getEntries({ content_type: 'siteSettings', include: 1 });
                if (siteData.items.length > 0) {
                    const fields = siteData.items[0].fields;
                    if (fields.brandName) brandImage.src = 'https:' + fields.brandName.fields.file.url;
                    brandSlogan.textContent = 'Built for Your Own Sound';
                }
            } catch (err) { console.error(err); }
        }
        syncNav();

        const params = new URLSearchParams(window.location.search);
        const productId = params.get('id');

        async function fetchDetail() {
            try {
                const entry = await client.getEntry(productId);
                const fields = entry.fields;
                let imageHtml = fields.image?.map(img => `<img src="${localProductImages[productId] || ('https:' + img.fields.file.url)}" class="block w-full aspect-[16/9] object-contain mb-6 bg-white border border-[#191713]/15">`).join('') || '';

                document.getElementById('detail-view').innerHTML = `
                    ${imageHtml}
                    <h1 class="text-4xl font-bold mb-4 uppercase tracking-tight text-[#191713]">${fields.title}</h1>
                    <div class="w-16 h-1 bg-[#b73524] mb-6"></div>
                    <p class="text-[#3c3328] whitespace-pre-line leading-relaxed text-lg mb-10">${fields.description || '目前没有产品说明。'}</p>
                    <a href="index.html" class="inline-block px-8 py-3 bg-[#193a5a] text-[#f8efd9] text-sm uppercase tracking-widest hover:bg-[#10273f] transition rounded-none">回到产品列表</a>
                `;
            } catch (err) {
                document.getElementById('detail-view').innerHTML = '<p class="text-[#b73524]">产品资料载入失败。</p>';
            }
        }
        fetchDetail();
    </script>
</body>
</html>
